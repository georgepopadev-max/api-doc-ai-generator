version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: apidoc-db
    environment:
      POSTGRES_DB: apidocdb
      POSTGRES_USER: apidoc
      POSTGRES_PASSWORD: apidoc123
    ports:
      - "5435:5432"
    volumes:
      - postgres_apidoc_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apidoc -d apidocdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_apidoc_data: